name: Manual Release (Example APK)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get (root)
        run: flutter pub get

      - name: Flutter pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Build example APK
        working-directory: example
        # Build debug APK which is automatically signed with debug keystore and can be installed.
        # For production apps, configure signing in build.gradle and use --release instead.
        run: flutter build apk --debug

      - name: Prepare artifact
        run: |
          APK_PATH="example/build/app/outputs/flutter-apk/app-debug.apk"
          RELEASE_NAME="network_speed_meter_example-${{ inputs.version }}-debug.apk"
          cp "$APK_PATH" "example/build/app/outputs/flutter-apk/$RELEASE_NAME"
          echo "apk_path=example/build/app/outputs/flutter-apk/$RELEASE_NAME" >> "$GITHUB_OUTPUT"
        id: artifact

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ inputs.version }}
          name: v${{ inputs.version }}
          commit: ${{ github.sha }}
          artifacts: ${{ steps.artifact.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
