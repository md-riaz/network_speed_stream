import java.util.Properties

pluginManagement {
    def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
    def localProperties = new Properties()
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withInputStream { localProperties.load(it) }
    }
    def flutterSdkPath = localProperties.getProperty("flutter.sdk")
    if (flutterSdkPath == null) {
        throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties.")
    }
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
    includeBuild("../..")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

def flutterSdkPath = settings.ext.flutterSdkPath

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url "https://storage.googleapis.com/download.flutter.io" }
        maven { url "$flutterSdkPath/bin/cache/artifacts/engine" }
    }
}

rootProject.name = "network_speed_meter_example"
include ":app"
include ":network_speed_meter"
project(":network_speed_meter").projectDir = new File(settingsDir, "../../android")
